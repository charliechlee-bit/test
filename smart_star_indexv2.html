<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌟 Smart Star Learning Adventure</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary:#6C63FF;
      --secondary:#FF6584;
      --accent:#43D9AD;
      --sun:#FFD166;
      --bg:#F0F4FF;
      --text:#2D3561;
      --muted:#8B8FC7;
      --correct:#43D9AD;
      --wrong:#FF6584;
      --shadow:0 8px 32px rgba(108,99,255,0.13);
      --radius:20px;
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:'Nunito',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    .hidden { display:none !important; }

    .bg-stars {
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      overflow:hidden;
    }

    .star {
      position:absolute;
      border-radius:50%;
      opacity:0.18;
      animation:float linear infinite;
    }

    @keyframes float {
      0% { transform:translateY(110vh); opacity:0; }
      10%,90% { opacity:0.18; }
      100% { transform:translateY(-10vh); opacity:0; }
    }

    #app {
      position:relative;
      z-index:1;
      max-width:780px;
      margin:auto;
      padding:20px 16px 60px;
    }

    .header {
      text-align:center;
      margin-bottom:28px;
    }

    .header h1 {
      font-family:'Fredoka One',cursive;
      font-size:clamp(2rem,6vw,3rem);
      color:var(--primary);
    }

    .xp-bar-wrap {
      background:white;
      border-radius:50px;
      padding:10px 18px;
      box-shadow:var(--shadow);
      margin-bottom:22px;
      display:flex;
      align-items:center;
      gap:12px;
    }

    .xp-track {
      flex:1;
      height:14px;
      background:#eee;
      border-radius:50px;
      overflow:hidden;
    }

    .xp-fill {
      height:100%;
      background:linear-gradient(90deg,var(--primary),var(--accent));
      transition:width .4s;
    }

    .subject-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
      gap:14px;
    }

    .subject-card {
      background:white;
      border-radius:var(--radius);
      padding:20px;
      box-shadow:var(--shadow);
      cursor:pointer;
      text-align:center;
      transition:transform .15s;
    }

    .subject-card:hover {
      transform:translateY(-4px);
    }
  </style>
</head>

<body>

<div class="bg-stars" id="bgStars"></div>

<div id="app">
  <div class="header">
    <h1>🌟 Smart Star</h1>
    <p>Learning Adventure — Let’s go!</p>
  </div>

  <div class="xp-bar-wrap">
    <strong>⚡ XP</strong>
    <div class="xp-track">
      <div id="xpFill" class="xp-fill" style="width:0%"></div>
    </div>
    <span id="xpStars">⭐ 0 XP</span>
  </div>

  <div id="screen-home">
    <div class="subject-grid" id="subjectGrid"></div>
  </div>
</div>

<script>
/* ================= STATE ================= */
const state = {
  totalXP: parseInt(localStorage.getItem("smartstar_xp") || "0"),
};

/* ================= SUBJECTS ================= */
const SUBJECTS = [
  { id:"maths", label:"Maths", emoji:"🔢" },
  { id:"grammar", label:"Grammar", emoji:"📝" },
  { id:"spelling", label:"Spelling", emoji:"🔤" },
  { id:"science", label:"Science", emoji:"🔬" },
  { id:"reading", label:"Reading", emoji:"📚" }
];

/* ================= UI ================= */
function updateXP() {
  document.getElementById("xpStars").textContent =
    "⭐ " + state.totalXP + " XP";
  document.getElementById("xpFill").style.width =
    (state.totalXP % 100) + "%";
}

function buildSubjects() {
  const grid = document.getElementById("subjectGrid");
  grid.innerHTML = "";
  SUBJECTS.forEach(s => {
    const d = document.createElement("div");
    d.className = "subject-card";
    d.innerHTML = `<div style="font-size:2rem">${s.emoji}</div><strong>${s.label}</strong>`;
    grid.appendChild(d);
  });
}

/* ================= BACKGROUND STARS ================= */
function buildStars() {
  const c = document.getElementById("bgStars");
  const colors = ["#6C63FF","#FF6584","#43D9AD","#FFD166"];

  for (let i=0;i<16;i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = 8 + Math.random()*16;
    s.style.width = size+"px";
    s.style.height = size+"px";
    s.style.left = Math.random()*100+"%";
    s.style.background = colors[Math.floor(Math.random()*colors.length)];
    s.style.animationDuration = (10+Math.random()*20)+"s";
    c.appendChild(s);
  }
}

/* ================= INIT ================= */
buildStars();
updateXP();
buildSubjects();

console.log("✅ Smart Star loaded successfully");
</script>

</body>
</html>
